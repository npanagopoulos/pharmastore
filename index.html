document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"f2e440af-e9fa-4a6f-b487-20a42d32534a\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#16181B;background:#F4F5F7;-webkit-font-smoothing:antialiased}\n  ::-webkit-scrollbar{width:10px;height:10px}\n  ::-webkit-scrollbar-thumb{background:#CfD3D7;border-radius:6px;border:2px solid transparent;background-clip:content-box}\n  ::-webkit-scrollbar-track{background:transparent}\n  input,button{font-family:inherit}\n  ._lnk{color:#1C6FE0;cursor:pointer}\n  ._lnk:hover{text-decoration:underline}\n  ._inp{outline:none}\n  ._inp:focus{border-color:#1C6FE0 !important}\n<\u002Fstyle>\n<script src=\"cd3682c1-476e-45d7-b044-341c59c3db99\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div id=\"app-root\" style=\"display:flex;height:100vh;min-width:1180px;overflow:hidden;background:#F4F5F7\">\n\n  <!-- SIDEBAR -->\n  <aside style=\"width:236px;flex:0 0 236px;background:#fff;border-right:1px solid #E8EAEC;display:flex;flex-direction:column;height:100%\">\n    <div style=\"height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;border-bottom:1px solid #F0F1F2\">\n      <div style=\"line-height:1\">\n        <div style=\"font-weight:800;font-size:17px;letter-spacing:-.3px;color:#EE6A2B\">skroutz<\u002Fdiv>\n        <div style=\"font-weight:700;font-size:9px;letter-spacing:.4px;color:#16181B;margin-top:1px\">merchants<\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"color:#B6BBC0;font-size:12px\">⌄<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1;overflow-y:auto;padding:12px 10px 24px\">\n      <div onclick=\"{{ goDashboard }}\" style=\"display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;font-size:13px;color:#41464C;cursor:pointer\" style-hover=\"background:#F5F6F7\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">▦<\u002Fspan>Επισκόπηση<\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 10px 5px;font-size:13px;color:#41464C\"><span style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">▤<\u002Fspan>Παραγγελίες<\u002Fspan><span style=\"color:#C2C7CC;font-size:11px\">⌄<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ ordersNav }}\" as=\"n\" hint-placeholder-count=\"5\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\"><span>{{ n.label }}<\u002Fspan><sc-if value=\"{{ n.badge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"background:#EEF0F2;color:#7A8088;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;min-width:20px;text-align:center\">{{ n.badge }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 10px 5px;font-size:13px;color:#41464C\"><span style=\"display:flex;align-items:center;gap:10px\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">◈<\u002Fspan>After sales <span style=\"background:#EAF1FD;color:#1C6FE0;font-size:9px;font-weight:700;border-radius:5px;padding:1px 6px\">Νέο<\u002Fspan><\u002Fspan><span style=\"color:#C2C7CC;font-size:11px\">⌄<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ afterNav }}\" as=\"n\" hint-placeholder-count=\"5\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\"><span>{{ n.label }}<\u002Fspan><sc-if value=\"{{ n.badge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"background:#EEF0F2;color:#7A8088;font-size:10px;font-weight:700;border-radius:10px;padding:1px 7px;min-width:20px;text-align:center\">{{ n.badge }}<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"display:flex;align-items:center;gap:10px;padding:9px 10px;font-size:13px;color:#41464C;cursor:pointer\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">▱<\u002Fspan>Fulfilled by Skroutz (FBS)<\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:10px;padding:9px 10px 5px;font-size:13px;color:#41464C\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">◷<\u002Fspan>Προώθηση προϊόντων<\u002Fdiv>\n      <div style=\"padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\">Όλα τα εργαλεία<\u002Fdiv>\n      <div onclick=\"{{ goDashboard }}\" style=\"padding:6px 10px 6px 33px;border-radius:7px;font-size:13px;font-weight:700;color:#1C6FE0;background:#EAF1FD;cursor:pointer;border-left:3px solid #1C6FE0\">Διαφήμιση<\u002Fdiv>\n      <div style=\"padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\">Skroutz Coins<\u002Fdiv>\n      <div style=\"padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\">Price Optimizer<\u002Fdiv>\n      <div style=\"padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\">Deals<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;padding:6px 10px 6px 36px;border-radius:7px;font-size:13px;color:#7A8088;cursor:pointer\" style-hover=\"background:#F5F6F7\">Κουπόνια <span style=\"background:#FDF2D6;color:#B07A0E;font-size:9px;font-weight:700;border-radius:5px;padding:1px 6px\">Beta<\u002Fspan><\u002Fdiv>\n\n      <div style=\"height:1px;background:#F0F1F2;margin:10px 8px\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:9px;padding:8px 10px;font-size:13px;color:#41464C;cursor:pointer\">Skroutz Χρηματοδότηση <span style=\"background:#EAF1FD;color:#1C6FE0;font-size:9px;font-weight:700;border-radius:5px;padding:1px 6px\">Νέο<\u002Fspan><\u002Fdiv>\n      <sc-for list=\"{{ bottomNav }}\" as=\"b\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;font-size:13px;color:#41464C;cursor:pointer\" style-hover=\"background:#F5F6F7\"><span style=\"width:16px;text-align:center;color:#9AA0A6\">{{ b.icon }}<\u002Fspan>{{ b.label }}<\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- MAIN -->\n  <div style=\"flex:1;display:flex;flex-direction:column;height:100%;min-width:0\">\n    <!-- TOPBAR -->\n    <header style=\"height:58px;flex:0 0 58px;background:#fff;border-bottom:1px solid #E8EAEC;display:flex;align-items:center;gap:16px;padding:0 24px\">\n      <div style=\"flex:1\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:18px;color:#6A7178;font-size:16px\">\n        <span style=\"cursor:pointer\">⚲<\u002Fspan><span style=\"cursor:pointer\">💬<\u002Fspan><span style=\"cursor:pointer\">📣<\u002Fspan><span style=\"cursor:pointer\">?<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;background:#F4F5F7;border:1px solid #E8EAEC;border-radius:9px;padding:5px 11px\">\n        <span style=\"font-size:13px;color:#41464C;font-weight:600\">💊 PharmaStore<\u002Fspan>\n        <span style=\"background:#1E7E40;color:#fff;font-size:11px;font-weight:700;border-radius:6px;padding:2px 8px\">Ενεργό<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"width:32px;height:32px;border-radius:50%;background:#16181B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700\">T<\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- CONTENT -->\n    <main style=\"flex:1;overflow-y:auto;padding:26px 32px 70px\">\n\n      <!-- ============ EMPTY STATE (no campaigns yet) ============ -->\n      <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"Empty / first campaign\" style=\"max-width:1080px;margin:0 auto\">\n        \n        \n\n        <!-- BANNER -->\n        \n        \n\n        <!-- HOW IT HELPS -->\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:13px\">Πώς θα σε βοηθήσει η διαφήμιση<\u002Fdiv>\n        <div style=\"font-size:14.5px;color:#41464C;line-height:1.6;max-width:780px;margin-bottom:20px;text-wrap:pretty\">Αύξησε τις πιθανότητές σου να κερδίσεις την πώληση από τον ανταγωνισμό, μέσα σε ένα περιβάλλον όπου οι χρήστες έχουν έρθει για να αγοράσουν.<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:13px;margin-bottom:44px;max-width:820px\">\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:#EAF1FD;color:#1C6FE0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:1px\">✓<\u002Fspan><span style=\"font-size:14px;color:#41464C;line-height:1.55\">Τα προϊόντα σου εμφανίζονται πιο ψηλά στα αποτελέσματα αναζήτησης, μπροστά σε αγοραστές με πρόθεση αγοράς.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:#EAF1FD;color:#1C6FE0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:1px\">✓<\u002Fspan><span style=\"font-size:14px;color:#41464C;line-height:1.55\">Ανοίγεις τη διαφήμιση μέσα σε λίγα λεπτά, χωρίς να είσαι ειδικός — εσύ επιλέγεις προϊόντα ή το Skroutz επιλέγει για σένα.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:#EAF1FD;color:#1C6FE0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:1px\">✓<\u002Fspan><span style=\"font-size:14px;color:#41464C;line-height:1.55\">Βάζεις bid σε επίπεδο κατηγορίας &amp; brand ή ανά προϊόν και ενισχύεις τις πιθανότητες για προβολή και πώληση.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:11px;align-items:flex-start\"><span style=\"flex:0 0 auto;width:22px;height:22px;border-radius:50%;background:#EAF1FD;color:#1C6FE0;display:flex;align-items:center;justify-content:center;font-size:12px;margin-top:1px\">✓<\u002Fspan><span style=\"font-size:14px;color:#41464C;line-height:1.55\">Κάνεις ελεγχόμενη επένδυση με χαμηλό ρίσκο και έχεις αναλυτικά δεδομένα αξιολόγησης της απόδοσης.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- GOALS -->\n        <div style=\"font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:16px\">Στόχοι<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:38px\">\n          <div style=\"background:#fff;border:1px solid #E8EAEC;border-radius:14px;padding:22px 20px;min-height:148px;display:flex;flex-direction:column\">\n            <div style=\"font-size:24px;margin-bottom:14px\">📈<\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:800;letter-spacing:-.2px;margin-bottom:7px\">Ενίσχυση πωλήσεων<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#6A7178;line-height:1.55\">Κέρδισε την πώληση από τον ανταγωνισμό σε προϊόντα υψηλής ζήτησης.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E8EAEC;border-radius:14px;padding:22px 20px;min-height:148px;display:flex;flex-direction:column\">\n            <div style=\"font-size:24px;margin-bottom:14px\">🚀<\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:800;letter-spacing:-.2px;margin-bottom:7px\">Λανσάρισμα νέων προϊόντων<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#6A7178;line-height:1.55\">Δώσε ώθηση σε νέα προϊόντα να ανέβουν στις αναζητήσεις.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid #E8EAEC;border-radius:14px;padding:22px 20px;min-height:148px;display:flex;flex-direction:column\">\n            <div style=\"font-size:24px;margin-bottom:14px\">📦<\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:800;letter-spacing:-.2px;margin-bottom:7px\">Ξεστοκάρισμα<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#6A7178;line-height:1.55\">Ξεφορτώσου απόθεμα δίνοντας προβολή σε προϊόντα με χαμηλή κίνηση.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- TERMS -->\n        <div onclick=\"{{ toggleTerms }}\" style=\"background:#F7F8F9;border:1px solid #EDEEF0;border-radius:11px;padding:16px 20px;display:flex;align-items:center;gap:13px;cursor:pointer;max-width:820px;margin-bottom:22px\">\n          <div style=\"{{ termsBox }}\">{{ termsCheck }}<\u002Fdiv>\n          <span style=\"font-size:14px;color:#41464C\">Έχω διαβάσει και αποδέχομαι τους <span style=\"color:#1C6FE0;font-weight:600\">Όρους χρήσης της υπηρεσίας<\u002Fspan> ↗<\u002Fspan>\n        <\u002Fdiv>\n\n        <!-- CTA -->\n        <div onclick=\"{{ startAd }}\" style=\"{{ ctaStyle }}\">+ Νέα διαφήμιση<\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============ DASHBOARD (Screen_1 / Screen_3) ============ -->\n      <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:1180px;margin:0 auto\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px\">\n          <div style=\"font-size:22px;font-weight:800;letter-spacing:-.4px\">Όλες οι καμπάνιες<\u002Fdiv>\n          <div onclick=\"{{ goGoal }}\" style=\"height:42px;border-radius:10px;padding:0 20px;display:flex;align-items:center;gap:7px;font-size:14px;font-weight:700;color:#fff;background:#16181B;cursor:pointer\" style-hover=\"background:#000\">+ Νέα διαφήμιση<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px\">\n          <div style=\"display:flex;align-items:center;gap:10px;flex:1\">\n            <div style=\"display:flex;align-items:center;gap:7px;height:38px;border:1px solid #E0E2E5;border-radius:9px;padding:0 13px;font-size:13px;color:#41464C;background:#fff;cursor:pointer\">(5/06/25 - 10/06/25) ⌄<\u002Fdiv>\n            <div style=\"position:relative;flex:1;max-width:420px\">\n              <span style=\"position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#A2A8AE;font-size:13px\">⌕<\u002Fspan>\n              <input placeholder=\"Αναζήτηση καμπάνιας\" class=\"_inp\" style=\"width:100%;height:38px;border:1px solid #E0E2E5;border-radius:9px;padding:0 12px 0 32px;font-size:13px;background:#fff\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"height:38px;border:1px solid #E0E2E5;border-radius:9px;padding:0 15px;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:#41464C;background:#fff;cursor:pointer\">⤓ Report<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- stat strip -->\n        <div style=\"background:#fff;border:1px solid #E8EAEC;border-radius:12px;padding:16px 22px;margin-bottom:16px;display:flex;gap:46px;flex-wrap:wrap\">\n          <sc-for list=\"{{ statStrip }}\" as=\"s\" hint-placeholder-count=\"7\">\n            <div><div style=\"font-size:12px;color:#8A9097;margin-bottom:4px\">{{ s.label }}<\u002Fdiv><div style=\"font-size:17px;font-weight:800;letter-spacing:-.3px\">{{ s.value }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- chart -->\n        <div style=\"background:#fff;border:1px solid #E8EAEC;border-radius:12px;padding:20px 22px;margin-bottom:26px\">\n          <div style=\"display:flex;align-items:flex-end;gap:30px;height:170px;padding:0 6px\">\n            <sc-for list=\"{{ chartBars }}\" as=\"b\" hint-placeholder-count=\"6\">\n              <div style=\"flex:1;display:flex;align-items:flex-end;justify-content:center;gap:7px;height:100%\">\n                <div style=\"width:26px;border-radius:4px 4px 0 0;background:#3B9BF0;height:{{ b.a }}%\"><\u002Fdiv>\n                <div style=\"width:26px;border-radius:4px 4px 0 0;background:#4DBE7A;height:{{ b.b }}%\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:flex-end;gap:20px;font-size:12px;color:#6A7178;margin-top:14px\">\n            <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#3B9BF0\"><\u002Fspan>Τζίρος<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:7px\"><span style=\"width:11px;height:11px;border-radius:3px;background:#4DBE7A\"><\u002Fspan>Κόστος<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- SECTION: Ενίσχυση πωλήσεων -->\n        <div style=\"font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:14px\">Στόχος: Ενίσχυση πωλήσεων<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E8EAEC;border-radius:12px;overflow:hidden;margin-bottom:34px\">\n          <div style=\"display:grid;grid-template-columns:2.4fr 1fr 1fr 1fr;padding:13px 22px;font-size:12px;color:#8A9097;background:#FAFBFC;border-bottom:1px solid #F0F1F2\">\n            <div>Καμπάνια<\u002Fdiv><div style=\"text-align:right\">Τζίρος<\u002Fdiv><div style=\"text-align:right\">Πωλήσεις<\u002Fdiv><div style=\"text-align:right\">Κόστος<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:2.4fr 1fr 1fr 1fr;padding:16px 22px;font-size:13.5px;align-items:center\">\n            <div style=\"display:flex;align-items:center;gap:13px\"><span style=\"color:#16181B;font-weight:600\">{{ enisxysiName }}<\u002Fspan><\u002Fdiv>\n            <div style=\"text-align:right;color:#41464C\">50<\u002Fdiv>\n            <div style=\"text-align:right;color:#41464C\">2<\u002Fdiv>\n            <div style=\"text-align:right;color:#41464C\">100€<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- SECTION: Υπόλοιποι στόχοι -->\n        <div style=\"font-size:19px;font-weight:700;letter-spacing:-.3px;margin-bottom:14px\">Υπόλοιποι στόχοι<\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E8EAEC;border-radius:12px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:1.8fr 1.1fr 1fr 1fr 1fr 1fr 1.2fr;padding:13px 22px;font-size:12px;color:#8A9097;background:#FAFBFC;border-bottom:1px solid #F0F1F2\">\n            <div>Καμπάνια<\u002Fdiv><div>Στόχος<\u002Fdiv><div>Budget<\u002Fdiv><div style=\"text-align:right\">Τζίρος<\u002Fdiv><div style=\"text-align:right\">Πωλήσεις<\u002Fdiv><div style=\"text-align:right\">Κόστος<\u002Fdiv><div style=\"text-align:right\">Διάρκεια<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ otherCampaigns }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <div style=\"display:grid;grid-template-columns:1.8fr 1.1fr 1fr 1fr 1fr 1fr 1.2fr;padding:18px 22px;font-size:13.5px;align-items:center;border-top:1px solid #F4F5F6\">\n              <div style=\"display:flex;align-items:center;gap:13px\"><span style=\"color:#16181B;font-weight:600\">{{ c.name }}<\u002Fspan><\u002Fdiv>\n              <div style=\"color:#41464C\">{{ c.goal }}<\u002Fdiv>\n              <div style=\"color:#6A7178\">{{ c.budget }}<\u002Fdiv>\n              <div style=\"text-align:right;color:#41464C\">{{ c.turnover }}<\u002Fdiv>\n              <div style=\"text-align:right;color:#41464C\">{{ c.sales }}<\u002Fdiv>\n              <div style=\"text-align:right;color:#41464C\">{{ c.cost }}<\u002Fdiv>\n              <div style=\"text-align:right;color:#6A7178;font-size:12.5px\">{{ c.dur }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ==== weight:700;margin-bottom:8px\">Διάρκεια διαφήμισης:<\u002Fdiv>\n          <div style=\"background:#F5F6F7;border-radius:10px;padding:18px;display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n            <div><div style=\"font-size:13px;color:#41464C;margin-bottom:7px\">Εναρξη<\u002Fdiv><input type=\"date\" value=\"{{ f.catStart.value }}\" onchange=\"{{ f.catStart.onChange }}\" class=\"_inp\" style=\"width:100%;height:44px;border:1px solid #E0E2E5;border-radius:9px;padding:0 12px;font-size:13px;background:#fff\"><\u002Fdiv>\n            <div><div style=\"font-size:13px;color:#41464C;margin-bottom:7px\">Λήξη (Προαιρετική)<\u002Fdiv><input type=\"date\" value=\"{{ f.catEnd.value }}\" onchange=\"{{ f.catEnd.onChange }}\" class=\"_inp\" style=\"width:100%;height:44px;border:1px solid #E0E2E5;border-radius:9px;padding:0 12px;font-size:13px;color:#9AA0A6;background:#fff\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid #EDEEF0;padding:16px 24px;display:flex;justify-content:space-between;gap:12px\">\n        <sc-if value=\"{{ catNotFirst }}\" hint-placeholder-val=\"{{ false }}\"><div onclick=\"{{ catPrev }}\" style=\"height:44px;border:1px solid #1C6FE0;border-radius:9px;padding:0 22px;display:flex;align-items:center;font-size:14px;font-weight:600;color:#1C6FE0;cursor:pointer;background:#fff\">Προηγούμενο<\u002Fdiv><\u002Fsc-if>\n        <sc-if value=\"{{ catFirst }}\" hint-placeholder-val=\"{{ true }}\"><div><\u002Fdiv><\u002Fsc-if>\n        <div onclick=\"{{ catNext }}\" style=\"height:44px;border-radius:9px;padding:0 22px;display:flex;align-items:center;font-size:14px;font-weight:700;color:#fff;background:#1C6FE0;cursor:pointer\" style-hover=\"background:#1559C0\">{{ catNextLabel }} ›<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;10 nt',\n      row: on ? 'background:#EAF1FD;border:1.5px solid #1C6FE0' : 'background:#fff;border:1.5px solid #E8EAEC',\n    });\n    const r1min = radio(!b1bid), r1bid = radio(b1bid);\n\n    // bulk1 bid chips (inline in the left card)\n    const bulk1Chips = this.ALL_BID_CHIPS.map(c => {\n      const on = this.state.bulk1Bid === c;\n      return { label:c, onClick: () => this.setState({ bulk1Bid:c, bulk1Mode:'bid' }),\n        style: on ? 'background:#1C6FE0;color:#fff' : 'background:#fff;color:#1C6FE0;border:1px solid #B9D2F5' };\n    });\n\n    // bulk2 categories (selection step, toggle opens modal; switch reflects enabled state)\n    const bulk2Cats = this.CATS.map(c => {\n      const on = !!this.state.catEnabled[c.cat];\n      return {\n        cat:c.cat, brands:c.brandList.length+' brands', min:c.min,\n        swTrack: sw(on).track, swKnob: sw(on).knob,\n        onToggle: () => this.setState({ catModal:true, catStep:1, catName:c.cat, commMode:'common', brandSel:{}, showCost:false }),\n      };\n    });\n\n    // products (prod1) — filtered by the campaign chosen on the goal screen\n    const campOf = (i) => { const c = this.CPC_CAMPAIGNS.find(c => i >= c.start && i < c.end); return c ? c.name : null; };\n    const preset = this.state.activePreset;\n    const presetAll = preset === '__all__';\n    const presetMaker = (preset && !presetAll) ? (this.CPC_CAMPAIGNS.find(c => c.name === preset) || {}).maker : '';\n    const prodIdxs = this.PRODUCTS.map((p,i) => i).filter(i => !preset || presetAll || campOf(i) === preset);\n    const products = prodIdxs.map((i) => {\n      const p = this.PRODUCTS[i];\n      const checked = this.state.selProducts[i] !== false;\n      return { ...p, boxStyle: checked ? 'background:#1C6FE0;border:1.5px solid #1C6FE0;color:#fff' : 'background:#fff;border:1.5px solid #CBD0D4;color:transparent',\n        onToggle: () => this.setState(s => ({ selProducts:{ ...s.selProducts, [i]: !s.selProducts[i] } })) };\n    });\n    const prodCount = prodIdxs.length;\n    const clean = (v) => String(v).replace('€','').replace('.',',').trim();\n    const selIdxs = prodIdxs.filter(i => this.state.selProducts[i] !== false);\n    const prod2 = (selIdxs.length ? selIdxs : prodIdxs).slice(0,8).map((i) => {\n      const p = this.PRODUCTS[i];\n      const bid = this.state.prod2Bids[i] ?? clean(p.minbid);\n      return { name:p.name, cat:p.cat, price:p.price, minbid:p.minbid, rec:p.rec, hasRec:p.hasRec, noRec:!p.hasRec, bid,\n        onMin: () => this.setState(s => ({ prod2Bids:{ ...s.prod2Bids, [i]: clean(p.minbid) } })),\n        onRec: () => this.setState(s => ({ prod2Bids:{ ...s.prod2Bids, [i]: clean(p.rec) } })),\n        onBidChange: (e) => { const v = e.target.value; this.setState(s => ({ prod2Bids:{ ...s.prod2Bids, [i]: v } })); },\n        onReset: () => this.setState(s => { const c = { ...s.prod2Bids }; delete c[i]; return { prod2Bids:c }; }),\n      };\n    });\n\n    // brands modal — derived from the selected category\n    const pcount = (name) => ((name.length*7) % 18) + 3;\n    const selCat = this.CATS.find(c => c.cat === this.state.catName) || this.CATS[0];\n    const catBrands = (selCat.brandList || []).map(n => ({ n, c: pcount(n) }));\n    const catBrandCount = catBrands.length;\n    const catBrandProducts = catBrands.reduce((s,b) => s + b.c, 0);\n    const brandOn = (n) => this.state.brandSel[n] !== false;\n    const gmap = {};\n    catBrands.forEach(b => { const L = (b.n[0]||'').toUpperCase(); (gmap[L] = gmap[L] || []).push(b); });\n    const brandGroups = Object.keys(gmap).sort().map(L => ({ letter:L, items: gmap[L].map((b,idx) => {\n      const on = brandOn(b.n); const s = sw(on);\n      return { label:`${b.n} (${b.c} προϊόντα)`, swTrack:s.track, swKnob:s.knob, rowBg: idx%2===0 ? 'background:#F5F6F7' : 'background:#fff',\n        onToggle: () => this.setState(st => ({ brandSel:{ ...st.brandSel, [b.n]: !brandOn(b.n) } })) };\n    }) }));\n    const brandFlat = catBrands.map((b,idx) => ({ name:b.n, count:b.c, rowBg: idx%2===0 ? 'background:#F5F6F7' : 'background:#fff', comm: brandComm(b.n) }));\n    const catBrandSummary = `Όλα τα Brands (${catBrandCount} brands / ${catBrandProducts} προϊόντα)`;\n\n    const commCommon = this.state.commMode === 'common';\n    const catStep = this.state.catStep;\n    const stepTitles = { 1:'Ποια brands θέλεις να διαφημίσεις;', 2:'Όρισε την προμήθεια διαφήμισης', 3:'Όρισε την διάρκεια της διαφήμισης' };\n    const nextLabel = catStep===1 ? 'Επόμενο βήμα: Όρισε προμήθεια' : catStep===2 ? 'Επόμενο βήμα: Όρισε την διάρκεια' : 'Ενεργοποίηση κατηγορίας';\n\n    const catNext = () => {\n      if (catStep < 3) this.setState({ catStep: catStep+1 });\n      else this.setState(s => {\n        // enable the category that opened the modal; if unknown, enable all as a last resort\n        const next = { ...s.catEnabled };\n        if (s.catName && this.CATS.some(c => c.cat === s.catName)) next[s.catName] = true;\n        else this.CATS.forEach(c => { next[c.cat] = true; });\n        return { catModal:false, bidApplied:true, catEnabled: next, hasCampaigns:true };\n      });\n    };\n\n    const otherCampaigns = this.OTHER_CAMPAIGNS.map(c => ({ ...c, onOpen: () => this.setState({ screen:'campaign', campaignSel:c.name }) }));\n    const campaignProducts = this.CAMPAIGN_PRODUCTS.map(c => ({ ...c }));\n\n    const termsAccepted = this.state.termsAccepted;\n    const termsBox = 'flex:0 0 auto;width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;' + (termsAccepted ? 'background:#1C6FE0;border:1.5px solid #1C6FE0;color:#fff' : 'background:#fff;border:1.5px solid #C7CBCF;color:transparent');\n    const termsCheck = termsAccepted ? '✓' : '';\n    const ctaStyle = 'display:inline-flex;align-items:center;gap:8px;height:50px;border-radius:12px;padding:0 34px;font-size:15px;font-weight:700;' + (termsAccepted ? 'color:#fff;background:#16181B;cursor:pointer' : 'color:#9AA0A6;background:#EBEDEF;cursor:not-allowed');\n\n    return {\n      isDashboard: screen==='dashboard',\n      isEmpty: screen==='empty',\n      termsBox, termsCheck, ctaStyle,\n      toggleTerms: () => this.setState(s => ({ termsAccepted: !s.termsAccepted })),\n      startAd: () => { if (this.state.termsAccepted) this.setState({ screen:'goal' }); },\n      isGoal: screen==='goal',\n      isBulk1: screen==='bulk1',\n      isBulk2: screen==='bulk2',\n      isProd1: screen==='prod1',\n      isProd2: screen==='prod2',\n      isProd3: screen==='prod3',\n      isCampaign: screen==='campaign',\n\n      ordersNav:this.ORDERS_NAV, afterNav:this.AFTER_NAV, bottomNav:this.BOTTOM_NAV,\n      statStrip:this.STAT_STRIP, chartBars:this.CHART,\n      swOnTrack:swOn.track, swOnKnob:swOn.knob,\n      enisxysiName: 'Ενίσχυση πωλήσεων 2026',\n      otherCampaigns,\n      campaignName: this.state.campaignSel || 'Παιδικά αντηλιακά',\n      campaignSub: 'Budget 100€ · 10/06/2026 – 10/07/2026 · Στόχος: Νέα προϊόντα',\n      campaignProducts,\n\n      goals, goalDetail,\n      commPreview: this.CATS.map(c => { const p = parseFloat(String(c.min).replace('%','').replace(',','.'))||0; const s = Math.min(15, p+4); return { cat:c.cat, minc:c.min, sellc: s.toFixed(2).replace('.',',')+'%' }; }),\n\n      bulk1MinStyle:r1min.row, bulk1MinDot:r1min.box, bulk1MinInner:r1min.inner,\n      bulk1BidStyle:r1bid.row, bulk1BidDot:r1bid.box, bulk1BidInner:r1bid.inner,\n      setBulk1Min: () => this.setState({ bulk1Mode:'min' }),\n      setBulk1Bid: () => this.setState({ bulk1Mode:'bid' }),\n\n      bulk2Cats, products, prod2, prodCount,\n      hasPreset: !!preset, presetCampaign: presetAll ? 'Αύξηση προβολής' : (preset || ''), presetMaker,\n      isBoostFlow: presetAll,\n      presetMsg: presetAll ? 'Εδώ θα εμφανίζονταν όλα τα προϊόντα του καταστήματός σου. Για τους σκοπούς αυτού του prototype βλέπεις ένα δείγμα.' : 'Τα προϊόντα της καμπάνιας είναι προεπιλεγμένα — πρόσθεσε ή αφαίρεσε όποια θες.',\n\n      bulk1Chips,\n      confirmAll: () => this.setState({ enisxysiActivated:true, screen:'dashboard', hasCampaigns:true }),\n      toggleCost: () => this.setState(s => ({ showCost:!s.showCost })),\n\n      // category modal\n      catModal:this.state.catModal, catName:this.state.catName, catStep,\n      catBrandCount, catBrandSummary,\n      f, endEnabled, toggleEnd,\n      catStep1: catStep===1, catStep2: catStep===2, catStep3: catStep===3,\n      catStepTitle: stepTitles[catStep],\n      catFirst: catStep===1, catNotFirst: catStep>1,\n      catNextLabel: nextLabel,\n      closeCatModal: () => this.setState({ catModal:false }),\n      catPrev: () => this.setState({ catStep: Math.max(1, catStep-1) }),\n      catNext,\n      brandGroups, brandFlat,\n      commIsCommon: commCommon, commIsPerbrand: !commCommon,\n      commCommonStyle: commCommon ? 'background:#EAF1FD;border:1.5px solid #1C6FE0' : 'background:#F5F6F7;border:1.5px solid #F5F6F7',\n      commPerbrandStyle: !commCommon ? 'background:#EAF1FD;border:1.5px solid #1C6FE0' : 'background:#F5F6F7;border:1.5px solid #F5F6F7',\n      commCommonText: commCommon ? 'color:#1C6FE0' : 'color:#16181B',\n      commPerbrandText: !commCommon ? 'color:#1C6FE0' : 'color:#16181B',\n      setCommCommon: () => this.setState({ commMode:'common' }),\n      setCommPerbrand: () => this.setState({ commMode:'perbrand' }),\n\n      // nav\n      goDashboard: () => this.setState(s => ({ screen: s.hasCampaigns ? 'dashboard' : 'empty' })),\n      goGoal: this.go('goal'),\n      goBulk1: this.go('bulk1'),\n      goBulk2: this.go('bulk2'),\n      goProd1: this.go('prod1'),\n      goProd2: this.go('prod2'),\n      goProd3: this.go('prod3'),\n      continueGoal: () => {\n        const g = this.state.goal;\n        if (g === 'sales') this.setState({ screen:'bulk1', activePreset:null });\n        else if (g === 'boost') this.setState({ screen:'prod1', activePreset:'__all__' });\n        else this.setState({ screen:'prod1', activePreset:g.slice(5) });\n      },\n      finishCampaign: () => this.setState({ screen:'dashboard', hasCampaigns:true }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
